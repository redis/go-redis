name: Go

on:
  push:
    branches: [master, v9, 'v9.*']
  pull_request:
    branches: [master, v9, v9.7, v9.8, 'ndyakov/**', 'ofekshenawa/**', 'ce/**']
  workflow_dispatch:


permissions:
  contents: read

jobs:
  test-redis-ce:
    name: test-redis-ce
    runs-on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
          redis-version:
            - "8.6.x" # Redis CE 8.6
            - "8.4.x" # Redis CE 8.4
            - "8.2.x" # Redis CE 8.2
            - "8.0.x" # Redis CE 8.0
          go-version:
            - "1.24.x"
            - oldstable
            - stable

    steps:
      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          go-version: ${{matrix.go-version}}
          redis-version: ${{ matrix.redis-version }}

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}

