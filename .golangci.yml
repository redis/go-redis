version: "2"
run:
  timeout: 5m
  tests: false
linters:
  settings:
    staticcheck:
      checks:
        - all
        # Incorrect or missing package comment.
        # https://staticcheck.dev/docs/checks/#ST1000
        - -ST1000
        # Omit embedded fields from selector expression.
        # https://staticcheck.dev/docs/checks/#QF1008
        - -QF1008
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Autopipeline is developed as a stack of PRs: the lower branches define
      # the engine (newAutoPipeliner, the apShard flusher/accumulate/flush
      # methods, numShards/setShardFn/calculateDelay, putPipeliner) while the
      # branch that wires it into Client/ClusterClient — and thus calls it —
      # lands on top. Those symbols therefore read as "unused" until the whole
      # stack is assembled. Scope the unused exemption to just these files so
      # genuine dead code elsewhere is still reported.
      - linters:
          - unused
        path: (autopipeline|pipeline)\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
